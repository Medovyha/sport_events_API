<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Events - Live Event Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">🏟️ Sports Events</h1>
                <p class="subtitle">Live Event Management Platform</p>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="all-events">
                All Events
            </button>
            <button class="nav-tab" data-tab="future-events">
                Upcoming Events
            </button>
            <button class="nav-tab" data-tab="past-events">
                Past Events
            </button>
        </nav>

        <!-- Loading Indicator -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading events...</p>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-message hidden"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- All Events Section -->
            <section id="all-events" class="tab-content active">
                <h2>All Events</h2>
                <div id="all-events-list" class="events-grid"></div>
            </section>

            <!-- Future Events Section -->
            <section id="future-events" class="tab-content">
                <h2>Upcoming Events</h2>
                <div id="future-events-list" class="events-grid"></div>
            </section>

            <!-- Past Events Section -->
            <section id="past-events" class="tab-content">
                <h2>Past Events</h2>
                <div id="past-events-list" class="events-grid"></div>
            </section>
        </main>

        <!-- Event Details Modal -->
        <div id="event-modal" class="modal hidden">
            <div class="modal-content">
                <button class="modal-close">&times;</button>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Sports Events. All rights reserved.</p>
            <p class="api-status">
                API Status: <span id="api-status" class="status-ok">Connected</span>
            </p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
